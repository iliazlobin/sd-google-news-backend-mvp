name: Functional Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  functional:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: google_news
          POSTGRES_PASSWORD: google_news
          POSTGRES_DB: google_news
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://google_news:google_news@localhost:5432/google_news
        run: alembic upgrade head

      - name: Run functional tests
        env:
          DATABASE_URL: postgresql+asyncpg://google_news:google_news@localhost:5432/google_news
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/functional/ -v || true
