name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-unit-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Source manifest and bring up stack
        run: |
          set -a
          source verify/manifest.env
          set +a
          eval "$UP"
          # Wait for healthy
          for i in $(seq 1 30); do
            STATUS=$(eval "$READY" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App healthy (HTTP $STATUS)"
              break
            fi
            echo "Waiting for app... attempt $i/30 (HTTP $STATUS)"
            sleep 2
          done

      - name: Run migrations
        run: docker compose exec -T app alembic upgrade head

      - name: Run acceptance tests
        env:
          API_BASE_URL: http://localhost:8010
        run: |
          python -m pip install httpx pytest
          pytest verify/acceptance/ -v

      - name: Tear down
        if: always()
        run: |
          set -a
          source verify/manifest.env
          set +a
          eval "$DOWN"
